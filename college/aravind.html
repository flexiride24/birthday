<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aravind Birthday Wish</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background: linear-gradient(135deg,#fff8f2,#fdfaf6,#f5f1eb);
font-family:'Inter',sans-serif;
text-align:center;
padding:40px 20px;
animation:fadePage 1s ease;
}

/* TITLE */

h1{
font-family:'Playfair Display',serif;
font-size:42px;
color:#3e3a39;
margin-bottom:10px;
}

.subtitle{
color:#7a7a7a;
margin-bottom:40px;
}

/* POLAROID WALL */

.wall{
max-width:1100px;
margin:auto;
margin-top: 60px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
}

/* POLAROID CARD */

.polaroid{
background:white;
padding:10px 10px 25px 10px;
border-radius:6px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
transition:0.35s;
}

/* IMAGE RULE */

.polaroid img{
height:230px;      /* SAME HEIGHT */
width:auto;        /* width adjusts automatically */
border-radius:4px;
display:block;
object-fit:cover;
}

/* RANDOM ROTATIONS */

.polaroid:nth-child(1){ transform:rotate(-6deg); }
.polaroid:nth-child(2){ transform:rotate(5deg); }
.polaroid:nth-child(3){ transform:rotate(-3deg); }
.polaroid:nth-child(4){ transform:rotate(7deg); }
.polaroid:nth-child(5){ transform:rotate(-4deg); }
.polaroid:nth-child(6){ transform:rotate(3deg); }
.polaroid:nth-child(7){ transform:rotate(-5deg); }
.polaroid:nth-child(8){ transform:rotate(6deg); }
.polaroid:nth-child(9){ transform:rotate(-2deg); }

/* HOVER EFFECT */

.polaroid:hover{
transform:rotate(0deg) scale(1.08);
box-shadow:0 15px 35px rgba(0,0,0,0.25);
z-index:5;
}

/* VIDEO */

.video-box{
margin-top:60px;
}

video{
width:520px;
max-width:95%;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* BACK BUTTON */

.back{
display:inline-block;
margin-top:40px;
padding:12px 25px;
background:#4b4341;
color:white;
text-decoration:none;
border-radius:25px;
transition:0.3s;
}

.back:hover{
background:#2f2a28;
transform:scale(1.05);
}

/* PAGE ANIMATION */

@keyframes fadePage{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:600px){

h1{
font-size:32px;
}

.polaroid img{
height:180px;
}

}

</style>

</head>

<body>

<h1>Aravind 💖</h1>
<p class="subtitle">A special birthday wish for you</p>

<h2>We... 📸</h2>

<div class="wall">

<div class="polaroid"><img src="aravind/1.jpeg"></div>
<div class="polaroid"><img src="aravind/2.jpeg"></div>
<div class="polaroid"><img src="aravind/3.jpeg"></div>
<div class="polaroid"><img src="aravind/4.jpeg"></div>
<div class="polaroid"><img src="aravind/5.jpeg"></div>
<div class="polaroid"><img src="aravind/6.jpeg"></div>
<div class="polaroid"><img src="aravind/7.jpeg"></div>
<div class="polaroid"><img src="aravind/8.jpeg"></div>
<div class="polaroid"><img src="aravind/9.jpeg"></div>

</div>

<div class="video-box">

<video controls>
<source src="aravind/video.mp4" type="video/mp4">
Your browser does not support the video tag.
</video>

</div>

<a class="back" href="../college.html">← Back to Friends</a>

</body>
</html>

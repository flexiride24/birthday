<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
/* RESET */
body{
  margin:0;
  background:#f5f5f5;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* INTRO SCREEN */
.intro{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  position:relative;
  overflow:hidden;
}

/* CONFETTI PARTICLES */
.particle{
  position:absolute;
  width:10px;
  height:10px;
  background: #ff5c5c;
  opacity:0.8;
  border-radius:50%;
  pointer-events:none;
  animation: fall 3s linear forwards;
}

@keyframes fall{
  0% { transform: translateY(-50px) rotate(0deg); opacity:1;}
  100% { transform: translateY(800px) rotate(720deg); opacity:0;}
}

/* BUTTON STYLING */
.button{
  background: #5a86d6; /* calm professional blue */
  color: #fff;
  font-size:32px;
  padding:28px 70px;
  border-radius:50px;
  cursor:pointer;
  transition:.3s;
  box-shadow: 0 8px 25px rgba(90,134,214,0.4), 0 0 50px rgba(90,134,214,0.2);
  animation: pulse 2s infinite alternate;
  text-shadow: 0 0 5px rgba(255,255,255,0.4);
  position:relative;
  overflow:hidden;
}

@keyframes pulse{
  0% { transform: scale(1); box-shadow: 0 8px 25px rgba(90,134,214,0.4), 0 0 50px rgba(90,134,214,0.2);}
  50% { transform: scale(1.08); box-shadow: 0 12px 30px rgba(90,134,214,0.5), 0 0 60px rgba(90,134,214,0.25);}
  100% { transform: scale(1); box-shadow: 0 8px 25px rgba(90,134,214,0.4), 0 0 50px rgba(90,134,214,0.2);}
}

.button:hover{
  transform: scale(1.12);
  box-shadow: 0 12px 35px rgba(90,134,214,0.6), 0 0 70px rgba(90,134,214,0.3);
}
/* CLICK SPARKLE */
.button::after{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  top:0; left:0;
  background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, transparent 70%);
  opacity:0;
  border-radius:60px;
  pointer-events:none;
  transition:0.3s;
}

.button:active::after{
  opacity:1;
  transform: scale(1.2);
}

/* MAIN PAGE */
.main{
  display:none;
}

/* HERO */
.hero{
  height:70vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:65px;
  color:#2d2d2d;
  animation:fadeUp 1.5s ease;
}

.subtitle{
  margin-top:15px;
  color:#888;
  font-size:16px;
}

/* GALLERY */
.gallery{
  width:65%;
  margin:auto;
  margin-top:60px;
  column-count:3;
  column-gap:25px;
}

/* CARDS */
.card{
  break-inside:avoid;
  margin-bottom:25px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  transform:translateY(40px);
  opacity:0;
  transition:all .8s ease;
}

.card.show{
  transform:translateY(0);
  opacity:1;
}

/* IMAGES */
.card img{
  width:100%;
  height:auto;
  display:block;
  transition:.5s;
}

.card:hover img{
  transform:scale(1.05);
}

/* BOTTOM BUTTON */
.bottom{
  display:flex;
  justify-content:center;
  margin:80px 0;
}

.button1{
  background:cyan;
  color:white;
  font-size:26px;
  padding:22px 60px;
  border-radius:60px;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  text-decoration:none;
}

.button1:hover{
  transform:scale(1.05);
}

/* ANIMATION */
@keyframes fadeUp{
  from{ opacity:0; transform:translateY(40px); }
  to{ opacity:1; transform:translateY(0); }
}

/* RESPONSIVE */
@media(max-width:900px){ .gallery{ column-count:2; } .hero h1{ font-size:42px; } }
@media(max-width:600px){ .gallery{ column-count:1; } }

</style>
</head>

<body>

<!-- INTRO SCREEN -->
<div class="intro">
  <div class="button" id="startBtn" onclick="startPage()"> 🎉 Click Me 🎁 🎉 </div>
</div>

<!-- MAIN PAGE -->
<div class="main">
  <div class="hero">
    <h1>Happy Birthday Nikhil🎉</h1>
    <p class="subtitle"> A journey through your memories </p>
  </div>

  <div class="gallery">
    <div class="card"><img src="nikhil/1.jpeg"></div>
    <div class="card"><img src="nikhil/2.jpeg"></div>
    <div class="card"><img src="nikhil/3.jpeg"></div>
    <div class="card"><img src="nikhil/4.jpeg"></div>
    <div class="card"><img src="nikhil/5.jpeg"></div>
    <div class="card"><img src="nikhil/6.jpeg"></div>
    <div class="card"><img src="nikhil/7.jpeg"></div>
    <div class="card"><img src="nikhil/8.jpeg"></div>
    <div class="card"><img src="nikhil/9.jpeg"></div>
    <div class="card"><img src="nikhil/10.jpeg"></div>
    <div class="card"><img src="nikhil/11.jpeg"></div>
    <div class="card"><img src="nikhil/12.jpeg"></div>
    <div class="card"><img src="nikhil/13.jpeg"></div>
  </div>

  <div class="bottom">
    <a href="memories.html" class="button1"> Click Me 🎁 </a>
  </div>
</div>

<script>
/* INTRO BUTTON */
function startPage(){
  // CONFETTI BURST
  for(let i=0;i<100;i++){
    const particle=document.createElement('div');
    particle.classList.add('particle');
    particle.style.left=Math.random()*100+'vw';
    particle.style.background=`hsl(${Math.random()*360},80%,60%)`;
    particle.style.width=5+Math.random()*10+'px';
    particle.style.height=5+Math.random()*10+'px';
    particle.style.animationDuration=2+Math.random()*2+'s';
    document.body.appendChild(particle);
    setTimeout(()=>{ particle.remove(); },3000);
  }

  document.querySelector(".intro").style.display="none";
  document.querySelector(".main").style.display="block";
}

/* SCROLL ANIMATION FOR CARDS */
const cards=document.querySelectorAll(".card");
function reveal(){
  cards.forEach(card=>{
    const top=card.getBoundingClientRect().top;
    const trigger=window.innerHeight-100;
    if(top<trigger){ card.classList.add("show"); }
  });
}
window.addEventListener("scroll",reveal);
</script>

</body>
</html>

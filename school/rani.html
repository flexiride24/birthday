<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rani Birthday Wish</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#fdfaf6;
font-family:'Inter',sans-serif;
text-align:center;
padding:40px;
animation:fadePage 1s ease;
}

h1{
font-family:'Playfair Display',serif;
font-size:42px;
color:#3e3a39;
margin-bottom:10px;
}

.subtitle{
color:#7a7a7a;
margin-bottom:30px;
}

/* video section */

.video-box{
margin-bottom:40px;
}

video{
width:500px;
max-width:90%;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* photo gallery */

.gallery{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.gallery img{
width:220px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:transform .4s ease;
}

.gallery img:hover{
transform:scale(1.08);
}

/* back button */

.back{
display:inline-block;
margin-top:40px;
padding:12px 25px;
background:#4b4341;
color:white;
text-decoration:none;
border-radius:25px;
transition:0.3s;
}

.back:hover{
background:#2f2a28;
transform:scale(1.05);
}

/* animation */

@keyframes fadePage{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<h1>Rani 💖</h1>
<p class="subtitle">A special birthday wish for you</p>



<h2>We...📸</h2>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">

</div>
<div class="video-box">

<video controls>
<source src="wish.mp4" type="video/mp4">
Your browser does not support the video tag.
</video>

</div>
<a class="back" href="../school.html">← Back to Friends</a>

</body>
</html>
